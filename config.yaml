# ===========================================================================
# Configurazione di "Trascrittore AI"
#
# Puoi modificare questi valori senza toccare il codice.
# Le righe che iniziano con "#" sono commenti e vengono ignorate.
# ===========================================================================

# Cartella dove vengono salvate le riunioni. Per ogni riunione viene creata
# una sottocartella con data e ora (es. output/2026-06-12_15-30/).
cartella_output: "output"

# -------------------------- TRASCRIZIONE (Whisper) -------------------------
trascrizione:
  # Quale backend usare per trascrivere:
  #   "faster_whisper" = LOCALE, gratis, offline, privato. Piu' lento su CPU
  #                      (1 ora di riunione ~35-45 min). DEFAULT.
  #   "groq"           = CLOUD su GPU, VELOCISSIMO (1 ora ~1-2 min), ma INVIA
  #                      l'audio ai server di Groq (serve GROQ_API_KEY nel .env,
  #                      piano gratuito su https://console.groq.com).
  backend: "faster_whisper"

  # Modello Whisper. Bilancia velocità (su CPU) e accuratezza:
  #   "medium"          -> piu' veloce, un filo meno preciso
  #   "large-v3"        -> molto preciso ma lento su CPU
  #   "large-v3-turbo"  -> ottimo compromesso (DEFAULT)
  modello: "large-v3-turbo"

  # Quantizzazione: "int8" e' la piu' leggera/veloce su CPU senza GPU.
  # Alternative: "int8_float16", "float32" (piu' pesanti).
  compute_type: "int8"

  # Lingua della riunione. "it" = italiano (forzato).
  lingua: "it"

  # VELOCITA' vs QUALITA':
  #   beam_size: 1 = piu' VELOCE (consigliato su CPU); 5 = qualita' massima ma
  #              circa il doppio piu' lento. Su audio pulito la differenza di
  #              qualita' e' minima.
  beam_size: 1

  # Numero di core CPU da usare. 0 = automatico (tutti). Piu' core = piu' veloce.
  # (vale solo per il backend locale "faster_whisper")
  cpu_threads: 0

  # Modello usato dal backend cloud "groq" (vale solo se backend = "groq"):
  #   "whisper-large-v3"       = qualita' massima (consigliato)
  #   "whisper-large-v3-turbo" = ancora piu' veloce
  modello_groq: "whisper-large-v3"

# ----------------------------- RIEPILOGO (AI) ------------------------------
riepilogo:
  # Quale servizio AI usare per il riepilogo:
  #   "nessuno"  = NIENTE riepilogo, solo trascrizione (DEFAULT, gratis e offline)
  #   "deepseek" = API DeepSeek (a pagamento, usa DEEPSEEK_API_KEY nel file .env)
  #   "claude"   = API Anthropic/Claude (a pagamento, usa ANTHROPIC_API_KEY)
  backend: "nessuno"

  # Modello DeepSeek (usato se backend = "deepseek"):
  #   "deepseek-reasoner" = il piu' POTENTE (DeepSeek-R1, "ragiona"); DEFAULT
  #   "deepseek-chat"     = piu' veloce ed economico (DeepSeek-V3)
  modello_deepseek: "deepseek-reasoner"

  # Modello Claude (usato se backend = "claude"):
  modello_claude: "claude-sonnet-4-6"

  # Numero massimo di caratteri per ogni "blocco" quando la trascrizione e'
  # molto lunga (strategia map-reduce, per non superare i limiti del modello).
  caratteri_per_blocco: 12000
